[build]
  publish = "."
  functions = "netlify/functions"

  [build.environment]
    NODE_VERSION = "18"
    SECRETS_SCAN_OMIT_PATHS = "netlify/functions/bc-member-verify.js"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[edge_functions]]
  path = "/"
  function = "calstategen-nav-login-cta"

[[edge_functions]]
  path = "/index.html"
  function = "calstategen-nav-login-cta"
