[build]
  publish = "."
  functions = "netlify/functions"

  [build.environment]
    NODE_VERSION = "24"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/intake"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/welcome.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/business-intake"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/business-dna-builder-preview.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/dashboard"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/aois-dashboard-preview.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/analyze-fit"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/analyze-fit-v2.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/jeff-dashboard"
  [headers.values]
    Cache-Control = "no-store"

# Required journey: Start -> Intake -> Business Intake -> Dashboard.
[[redirects]]
  from = "/start"
  to = "/intake"
  status = 302
  force = true

