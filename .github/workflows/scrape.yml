name: Scrape CA bids

on:
  schedule:
    - cron: '0 13 * * *'   # ~6am Pacific daily
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: node scripts/scrape.js
      - name: Commit refreshed bids.json and categories.json
        run: |
          git config user.name "calstategen-bot"
          git config user.email "bot@aproposgroupllc.com"
          git add bids.json categories.json
          git commit -m "data: refresh CA bids" || echo "no changes to commit"
          git push
      - name: Sync into Supabase raw table (state_contract_opportunities)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-supabase.js
