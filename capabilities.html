<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NAT-CORP — Build Your Capability Profile</title><style>:root{--bg:#050d20;--panel:#0d2047;--line:rgba(255,255,255,.12);--text:#fff;--muted:#8ea4cd;--green:#6ee7a8;--cyan:#68d8ff}*{box-sizing:border-box}body{margin:0;background:linear-gradient(150deg,#0b1d47,#040914 70%);color:var(--text);font:15px/1.5 Arial,sans-serif;min-height:100vh}.top{position:sticky;top:0;z-index:10;padding:16px 24px;background:rgba(4,9,20,.92);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.brand{font:600 20px Georgia,serif}.shell{max-width:1180px;margin:auto;padding:28px}.hero{text-align:center;margin:20px auto 30px;max-width:760px}.hero h1{font:500 clamp(32px,5vw,58px) Georgia,serif;margin:0 0 12px}.hero p,.muted{color:var(--muted)}.steps{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:18px}.step{padding:10px;border:1px solid var(--line);border-radius:10px;color:var(--muted);font-size:12px}.step.active{border-color:var(--green);color:var(--green);background:rgba(110,231,168,.08)}.panel{background:rgba(13,32,71,.82);border:1px solid var(--line);border-radius:18px;padding:22px;margin-bottom:18px}.panel h2{font:500 25px Georgia,serif;margin:0 0 8px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.choice{border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;background:rgba(255,255,255,.03)}.choice.sel{border-color:var(--green);background:rgba(110,231,168,.08)}.choice input{margin-right:8px}.domain{margin:14px 0}.domain h3{font:500 20px Georgia,serif}.cap{border:1px solid var(--line);border-radius:12px;padding:13px;margin:8px 0;display:flex;gap:10px;align-items:flex-start}.cap small{display:block;color:var(--muted)}.pill{display:inline-block;border-radius:999px;padding:3px 8px;font-size:10px;background:rgba(104,216,255,.12);color:var(--cyan);margin-top:6px}.search{width:100%;padding:13px;border-radius:10px;border:1px solid var(--line);background:#071632;color:#fff;margin:12px 0}.nav{display:flex;justify-content:space-between;gap:12px}.btn{border:0;border-radius:10px;padding:12px 18px;font-weight:800;cursor:pointer}.primary{background:var(--green);color:#062036}.secondary{background:rgba(255,255,255,.08);color:#fff;border:1px solid var(--line)}.hidden{display:none}.review ul{columns:2}.status{padding:12px;border-radius:10px;margin:10px 0;background:rgba(104,216,255,.08);color:var(--cyan)}@media(max-width:700px){.steps{grid-template-columns:1fr}.shell{padding:14px}.review ul{columns:1}}</style></head><body><header class="top"><div class="brand">National Corporation Contract Exchange</div><div id="count" class="muted">0 capabilities selected</div></header><main class="shell"><section class="hero"><div style="color:var(--green);font-size:12px;letter-spacing:.16em;text-transform:uppercase">AOIE Capability Profile Pilot</div><h1>Tell us what your business can actually deliver.</h1><p>AOIE uses a procurement-derived taxonomy, business roles, and service/product separation to build a clean opportunity dashboard for this visit.</p></section><div class="steps" id="steps"></div><section class="panel" id="screen"></section><div class="nav"><button class="btn secondary" id="back">Back</button><button class="btn primary" id="next">Continue</button></div></main><script>'use strict';const API='/.netlify/functions/';const state={step:0,taxonomy:null,profileId:null,sessionId:null,roles:[],primaryRole:null,capabilities:[],territory:[],capacity:{},business:null};const labels=['Business Roles','Services Performed','Products Supplied','Territory & Capacity','Review'];const roleOptions=[['PRIME_CONTRACTOR','Prime Contractor'],['SUBCONTRACTOR','Subcontractor'],['PROFESSIONAL_CONSULTANT','Professional Consultant'],['SERVICE_PROVIDER','Service Provider'],['PRODUCT_SUPPLIER','Product Supplier'],['MANUFACTURER','Manufacturer'],['DISTRIBUTOR','Distributor'],['AUTHORIZED_RESELLER','Authorized Reseller'],['CONSTRUCTION_CONTRACTOR','Construction Contractor'],['SPECIALTY_TRADE_CONTRACTOR','Specialty Trade Contractor'],['MAINTENANCE_PROVIDER','Maintenance Provider'],['SOFTWARE_VENDOR','Software Vendor'],['SYSTEMS_INTEGRATOR','Systems Integrator'],['STAFFING_PROVIDER','Staffing Provider'],['TRAINING_PROVIDER','Training Provider'],['HEALTHCARE_PROVIDER','Healthcare Provider'],['TRANSPORTATION_PROVIDER','Transportation Provider'],['NONPROFIT_SERVICE_PROVIDER','Nonprofit Service Provider']];const esc=s=>String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));function currentIntake(){try{return JSON.parse(sessionStorage.getItem('natcorp_intake')||localStorage.getItem('calgcc_profile')||'{}')}catch{return{}}}async function api(name,method='GET',body){const r=await fetch(API+name,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});const d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||'Request failed');return d}function renderSteps(){steps.innerHTML=labels.map((x,i)=>`<div class="step ${i===state.step?'active':''}">${i+1}. ${x}</div>`).join('')}function capSelected(id){return state.capabilities.includes(id)}function toggleCap(id){state.capabilities=capSelected(id)?state.capabilities.filter(x=>x!==id):[...state.capabilities,id];render()}function roleSelected(id){return state.roles.includes(id)}function toggleRole(id){state.roles=roleSelected(id)?state.roles.filter(x=>x!==id):[...state.roles,id];if(!state.roles.includes(state.primaryRole))state.primaryRole=state.roles[0]||null;render()}function capabilityList(types){const q=(document.getElementById('capSearch')?.value||'').toLowerCase();return state.taxonomy.domains.map(d=>{const caps=d.categories.flatMap(c=>c.groups.flatMap(g=>g.capabilities)).filter(c=>types.includes(c.procurement_type)&&(!q||`${c.display_name} ${c.description}`.toLowerCase().includes(q)));if(!caps.length)return'';return`<div class="domain"><h3>${esc(d.display_name)}</h3>${caps.map(c=>`<label class="cap"><input type="checkbox" ${capSelected(c.id)?'checked':''} onchange="toggleCap('${c.id}')"><span><strong>${esc(c.display_name)}</strong><small>${esc(c.description||'')}</small><span class="pill">${esc(c.procurement_type)}</span></span></label>`).join('')}</div>`}).join('')}function render(){renderSteps();count.textContent=`${state.capabilities.length} capabilities selected`;back.style.visibility=state.step?'visible':'hidden';next.textContent=state.step===4?'Generate My Opportunity Dashboard':'Continue';if(state.step===0){screen.innerHTML=`<h2>How does your business operate?</h2><p class="muted">Select every role that applies, then choose one primary role.</p><div class="grid">${roleOptions.map(([id,name])=>`<div class="choice ${roleSelected(id)?'sel':''}" onclick="toggleRole('${id}')"><label><input type="checkbox" ${roleSelected(id)?'checked':''}>${name}</label>${roleSelected(id)?`<div style="margin-top:8px"><label><input type="radio" name="primary" ${state.primaryRole===id?'checked':''} onclick="event.stopPropagation();state.primaryRole='${id}';render()"> Primary role</label></div>`:''}</div>`).join('')}</div>`}else if(state.step===1){screen.innerHTML=`<h2>What does your business perform?</h2><p class="muted">Services, professional services, construction, maintenance, software, and equipment rental.</p><input id="capSearch" class="search" placeholder="Search capabilities in normal business language" oninput="render()">${capabilityList(['SERVICE','PROFESSIONAL_SERVICE','CONSTRUCTION','MAINTENANCE','SOFTWARE','EQUIPMENT_RENTAL','HYBRID'])}`}else if(state.step===2){screen.innerHTML=`<h2>What does your business sell or supply?</h2><p class="muted">Product selection does not imply installation, repair, or maintenance capability.</p><input id="capSearch" class="search" placeholder="Search products, equipment, or supplies" oninput="render()">${capabilityList(['PRODUCT'])||'<div class="muted">No product capabilities currently match the search.</div>'}`}else if(state.step===3){screen.innerHTML=`<h2>Territory and capacity</h2><div class="grid"><label>Preferred states<input class="search" id="states" value="${esc((state.territory||[]).join(', '))}" placeholder="CA, AZ, NV"></label><label>Minimum contract value<input class="search" id="minv" type="number" value="${state.capacity.minimum_contract_value||''}"></label><label>Maximum contract value<input class="search" id="maxv" type="number" value="${state.capacity.maximum_contract_value||''}"></label><label class="choice"><input id="primeReady" type="checkbox" ${state.capacity.prime_ready?'checked':''}> Prime-contractor ready</label><label class="choice"><input id="subAvailable" type="checkbox" ${state.capacity.subcontractor_available?'checked':''}> Available as subcontractor</label><label class="choice"><input id="recurring" type="checkbox" ${state.capacity.recurring_service_capable?'checked':''}> Recurring-service capable</label></div>`}else{const selected=[];state.taxonomy.domains.forEach(d=>d.categories.forEach(c=>c.groups.forEach(g=>g.capabilities.forEach(x=>{if(capSelected(x.id))selected.push(x)}))));screen.innerHTML=`<h2>Review your Capability Profile</h2><div class="review"><h3>Business roles</h3><ul>${state.roles.map(r=>`<li>${esc(roleOptions.find(x=>x[0]===r)?.[1]||r)}${r===state.primaryRole?' — Primary':''}</li>`).join('')}</ul><h3>Selected capabilities</h3><ul>${selected.map(c=>`<li>${esc(c.display_name)} <span class="pill">${esc(c.procurement_type)}</span></li>`).join('')}</ul><h3>Territory</h3><p>${esc(state.territory.join(', ')||'Not specified')}</p><div id="saveStatus"></div></div>`}}async function ensureProfile(){if(state.profileId)return;const intake=currentIntake();state.business=intake;const d=await api('aoie-create-profile','POST',{legal_business_name:intake.business_name||intake.legal_name||intake.company_name||'NAT-CORP Pilot Business',business_description:intake.description||'',website:intake.website||'',primary_city:intake.city||'',primary_state:intake.state||'CA',primary_zip:intake.zip||''});state.profileId=d.profile_id;state.sessionId=d.session_id;sessionStorage.setItem('aoie_profile_id',d.profile_id);sessionStorage.setItem('aoie_session_id',d.session_id)}function captureCapacity(){state.territory=(states.value||'').split(',').map(x=>x.trim().toUpperCase()).filter(Boolean);state.capacity={minimum_contract_value:Number(minv.value)||null,maximum_contract_value:Number(maxv.value)||null,prime_ready:primeReady.checked,subcontractor_available:subAvailable.checked,recurring_service_capable:recurring.checked,geographic_capacity:state.territory}}async function advance(){if(state.step===0&&(!state.roles.length||!state.primaryRole))return alert('Select at least one role and one primary role.');if(state.step===1&&!state.capabilities.length)return alert('Select at least one capability.');if(state.step===3)captureCapacity();if(state.step<4){state.step++;render();return}next.disabled=true;try{await ensureProfile();const roles=state.roles.map(r=>({role_code:r,role_name:roleOptions.find(x=>x[0]===r)?.[1]||r,is_primary:r===state.primaryRole}));await api('aoie-save-profile','POST',{profile_id:state.profileId,roles,capabilities:state.capabilities.map((id,i)=>({capability_id:id,priority:i+1,resolution_method:'USER_SELECTED',resolution_confidence:100})),capacity:state.capacity,preferences:{preferred_states:state.territory}});sessionStorage.setItem('aoie_capability_profile_v1','true');location.href='/dashboard.html?aoie_profile='+encodeURIComponent(state.profileId)}catch(e){saveStatus.innerHTML=`<div class="status">${esc(e.message)}</div>`;next.disabled=false}}back.onclick=()=>{if(state.step){state.step--;render()}};next.onclick=advance;(async()=>{try{state.taxonomy=await api('aoie-taxonomy');const intake=currentIntake();state.territory=[String(intake.state||'CA').toUpperCase()];render()}catch(e){screen.innerHTML=`<div class="status">Capability Profile unavailable: ${esc(e.message)}</div>`;next.disabled=true}})();</script></body></html>
